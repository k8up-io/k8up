name: Lint

on:
  pull_request:
  push:
    branches:
    - master


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Determine Go version from go.mod
      run: echo "GO_VERSION=$(go mod edit -json | jq -r .Go)" >> $GITHUB_ENV

    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}


    - name: Run linters
      run: make lint
