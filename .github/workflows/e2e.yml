name: E2E

on:
  pull_request:
    branches:
    - master
    paths-ignore:
      - 'docs/**'
      - 'charts/**'
      - '*.md'
      - '.gitignore'
      - '.editorconfig'
      - 'renovate.json'
      - '.github/**'
      - '!.github/workflows/e2e.yml'

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: basic
            tests: "test-01-lint.bats test-02-deployment.bats test-03-backup.bats test-04-restore.bats"
          - name: annotated
            tests: "test-05-annotated-backup.bats test-08-restore-backupcommand.bats"
          - name: rwo-and-pods
            tests: "test-06-pvc-rwo.bats test-09-pod-backupcommand.bats"
          - name: tls
            tests: "test-10-restore-self-signed-tls.bats test-11-archive-self-signed-tls.bats"
          - name: misc
            tests: "test-12-annotated-failure.bats test-13-cleanup-empty-jobs.bats test-15-backup-with-selectors.bats"
    name: e2e (${{ matrix.group.name }})
    steps:
    - uses: actions/checkout@v6

    - name: Determine Go version from go.mod
      run: echo "GO_VERSION=$(go mod edit -json | jq -r .Go)" >> $GITHUB_ENV

    - uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}


    - name: Run e2e tests
      run: make crd e2e-test -e KIND_KUBECTL_ARGS=--validate=false -e bats_args="--report-formatter junit" -e BATS_FILES="${{ matrix.group.tests }}"

    - name: Retry failed e2e tests
      if: failure()
      run: make e2e-test -e KIND_KUBECTL_ARGS=--validate=false -e bats_args="--report-formatter junit" -e BATS_FILES="${{ matrix.group.tests }}"

    - name: Collect debug info on failure
      if: failure()
      run: |
        echo "=== Pod status ==="
        kubectl get pods -A --no-headers | grep -v Running || true
        echo "=== Recent events ==="
        kubectl get events -A --sort-by='.lastTimestamp' | tail -20 || true

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure()
      with:
        report_paths: '**/e2e/report.xml'
        github_token: ${{ secrets.GITHUB_TOKEN }}
        check_name: e2e-report (${{ matrix.group.name }})
