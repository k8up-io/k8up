{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ include "k8up.fullname" . }}-manager'
  labels:
    {{- include "k8up.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
      - persistentvolumes
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
  - apiGroups:
      - k8up.io
    resources:
      - archives
      - backups
      - checks
      - effectiveschedules
      - prebackuppods
      - prunes
      - restores
      - schedules
      - snapshots
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - k8up.io
    resources:
      - archives/finalizers
      - archives/status
      - backups/finalizers
      - backups/status
      - checks/finalizers
      - checks/status
      - prebackuppods/finalizers
      - prebackuppods/status
      - prunes/finalizers
      - prunes/status
      - restores/finalizers
      - restores/status
      - schedules/finalizers
      - schedules/status
      - snapshots/finalizers
      - snapshots/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - k8up.io
    resources:
      - effectiveschedules/finalizers
    verbs:
      - update
  - apiGroups:
      - k8up.io
    resources:
      - podconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resourceNames:
      - k8up-executor
    resources:
      - clusterroles
    verbs:
      - bind
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - update
      - watch
{{- end -}}
